version: "3.8"
services:
    # Chạy Backend
    backend:
        build: ./backend
        ports:
            - "8000:8000"
        volumes:
            - ./backend:/var/www
        environment:
            - APP_ENV=local
            - APP_KEY=base64:... # Điền key của bạn vào đây

    # Chạy Frontend
    frontend:
        build: ./frontend
        ports:
            - "3000:80" # Truy cập web qua cổng 3000
        depends_on:
            - backend
